<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Погода v2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }

    .app-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.9;
    }
    .version-badge {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 3px 8px;
      border-radius: 20px;
      align-self: flex-start;
      margin-top: 4px;
    }
    .subtitle {
      font-size: 0.78rem;
      opacity: 0.35;
      letter-spacing: 2px;
      margin-bottom: 36px;
      text-transform: uppercase;
    }

    /* Search */
    .search-box {
      display: flex;
      gap: 10px;
      max-width: 600px;
      width: 100%;
      margin-bottom: 20px;
    }
    .search-box input {
      flex: 1;
      padding: 14px 20px;
      border-radius: 50px;
      border: 2px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input::placeholder { color: rgba(255,255,255,0.38); }
    .search-box input:focus { border-color: rgba(255,255,255,0.38); }
    .search-box button {
      padding: 14px 28px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .search-box button:hover { opacity: 0.88; transform: scale(1.02); }
    .search-box button:active { transform: scale(0.97); }

    /* Quick picks */
    .quick-picks {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: 600px;
      width: 100%;
      margin-bottom: 32px;
      justify-content: center;
    }
    .quick-picks span {
      padding: 6px 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.2s;
      user-select: none;
    }
    .quick-picks span:hover { background: rgba(255,255,255,0.16); }

    /* Error / Loading */
    #error {
      display: none;
      color: #ff8a80;
      background: rgba(255,0,0,0.08);
      border: 1px solid rgba(255,0,0,0.2);
      border-radius: 10px;
      padding: 12px 20px;
      max-width: 600px;
      width: 100%;
      margin-bottom: 20px;
      text-align: center;
      font-size: 0.9rem;
    }
    #loading { display: none; font-size: 0.92rem; opacity: 0.6; margin-bottom: 20px; }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Weather card */
    #weather-card {
      display: none;
      max-width: 600px;
      width: 100%;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 20px;
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .location { font-size: 1.55rem; font-weight: 600; line-height: 1.2; }
    .location small { display: block; font-size: 0.88rem; font-weight: 400; opacity: 0.5; margin-top: 4px; }
    .w-icon { font-size: 4rem; line-height: 1; }

    /* ── Real-time clock ── */
    .clock-block {
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px;
      padding: 18px 24px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .clock-left { flex: 1; }
    .clock-time {
      font-size: 2.8rem;
      font-weight: 200;
      letter-spacing: 3px;
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      line-height: 1;
    }
    .clock-time .seconds { opacity: 0.45; font-size: 2rem; }
    .clock-date {
      font-size: 0.88rem;
      opacity: 0.55;
      margin-top: 6px;
      text-transform: capitalize;
    }
    .clock-tz {
      font-size: 0.7rem;
      opacity: 0.3;
      margin-top: 4px;
      letter-spacing: 0.5px;
    }
    .clock-right { text-align: right; }
    .clock-day-night {
      font-size: 2rem;
      line-height: 1;
      margin-bottom: 4px;
    }
    .clock-utc {
      font-size: 0.72rem;
      opacity: 0.35;
      letter-spacing: 0.5px;
    }

    /* Weather info */
    .temp-main { font-size: 5rem; font-weight: 200; line-height: 1; margin-bottom: 8px; }
    .description { font-size: 1.05rem; opacity: 0.7; text-transform: capitalize; margin-bottom: 6px; }
    .feels-like { font-size: 0.88rem; opacity: 0.5; margin-bottom: 28px; }

    hr.divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin-bottom: 24px; }

    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .stat { text-align: center; }
    .stat-icon { font-size: 1.35rem; margin-bottom: 6px; }
    .stat-value { font-size: 1.1rem; font-weight: 600; }
    .stat-label { font-size: 0.72rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

    /* Forecast */
    #forecast-card {
      display: none;
      max-width: 600px;
      width: 100%;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 24px;
      animation: fadeUp 0.4s ease 0.1s both;
    }
    #forecast-card h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.45;
      margin-bottom: 16px;
    }
    .forecast-days { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; }
    .forecast-day {
      flex: 1;
      min-width: 72px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 12px 6px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      user-select: none;
    }
    .forecast-day:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
    .forecast-day.active {
      background: rgba(102,126,234,0.2);
      border-color: rgba(102,126,234,0.6);
      transform: translateY(-2px);
    }
    .forecast-day .day-name { font-size: 0.76rem; opacity: 0.5; margin-bottom: 8px; }
    .forecast-day.active .day-name { opacity: 0.9; }
    .forecast-day .day-icon { font-size: 1.5rem; margin-bottom: 8px; }
    .forecast-day .day-max { font-size: 0.95rem; font-weight: 600; }
    .forecast-day .day-min { font-size: 0.85rem; opacity: 0.45; margin-left: 3px; }
    .forecast-day .day-hint { font-size: 0.62rem; opacity: 0.3; margin-top: 6px; letter-spacing: 0.5px; }

    /* Day detail */
    #day-detail {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.4s ease, opacity 0.3s ease, margin-top 0.3s ease;
      opacity: 0;
      margin-top: 0;
    }
    #day-detail.open { max-height: 400px; opacity: 1; margin-top: 16px; }
    .detail-inner {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px;
    }
    .detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .detail-date { font-size: 1rem; font-weight: 600; text-transform: capitalize; }
    .detail-date small { display: block; font-size: 0.78rem; font-weight: 400; opacity: 0.5; margin-top: 2px; }
    .detail-icon-desc { display: flex; align-items: center; gap: 10px; }
    .detail-icon { font-size: 2.4rem; line-height: 1; }
    .detail-desc { font-size: 0.9rem; opacity: 0.75; }
    .detail-temps { font-size: 1.5rem; font-weight: 300; margin-bottom: 16px; }
    .detail-temps .max { font-weight: 600; }
    .detail-temps .min { opacity: 0.5; margin-left: 8px; }
    hr.detail-divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin-bottom: 14px; }
    .detail-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .detail-item { text-align: center; }
    .detail-item .di-icon { font-size: 1.1rem; margin-bottom: 4px; }
    .detail-item .di-val { font-size: 0.92rem; font-weight: 600; }
    .detail-item .di-lbl { font-size: 0.68rem; opacity: 0.45; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
    .sun-row {
      display: flex;
      justify-content: space-around;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .sun-item { text-align: center; }
    .sun-item .sun-icon { font-size: 1.2rem; margin-bottom: 4px; }
    .sun-item .sun-val { font-size: 0.9rem; font-weight: 600; }
    .sun-item .sun-lbl { font-size: 0.68rem; opacity: 0.45; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

    /* Suggestions */
    .search-wrapper { position: relative; flex: 1; }
    #suggestions {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: #1e2a45;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      overflow: hidden;
      z-index: 100;
      max-height: 220px;
      overflow-y: auto;
    }
    #suggestions div {
      padding: 12px 18px;
      cursor: pointer;
      font-size: 0.92rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.15s;
    }
    #suggestions div:last-child { border-bottom: none; }
    #suggestions div:hover { background: rgba(255,255,255,0.1); }
    #suggestions div small { display: block; font-size: 0.75rem; opacity: 0.45; margin-top: 2px; }
  </style>
</head>
<body>

<div class="app-title">
  <h1>&#127748; Погода</h1>
  <span class="version-badge">v2</span>
</div>
<div class="subtitle">Реальное время &middot; Без регистрации и API-ключа</div>

<div class="search-box">
  <div class="search-wrapper">
    <input id="city-input" type="text" placeholder="Введите город или страну..."
           oninput="onInput()" onkeydown="onKey(event)" autocomplete="off" />
    <div id="suggestions"></div>
  </div>
  <button onclick="searchSelected()">Найти</button>
</div>

<div class="quick-picks">
  <span onclick="quickSearch('Москва')">Москва</span>
  <span onclick="quickSearch('Санкт-Петербург')">Санкт-Петербург</span>
  <span onclick="quickSearch('Лондон')">Лондон</span>
  <span onclick="quickSearch('Нью-Йорк')">Нью-Йорк</span>
  <span onclick="quickSearch('Токио')">Токио</span>
  <span onclick="quickSearch('Дубай')">Дубай</span>
  <span onclick="quickSearch('Париж')">Париж</span>
  <span onclick="quickSearch('Берлин')">Берлин</span>
  <span onclick="quickSearch('Пекин')">Пекин</span>
  <span onclick="quickSearch('Сидней')">Сидней</span>
</div>

<div id="loading"><span class="spinner"></span>Загрузка...</div>
<div id="error"></div>

<div id="weather-card">
  <div class="card-header">
    <div class="location" id="w-location"></div>
    <div class="w-icon" id="w-icon"></div>
  </div>

  <!-- Real-time clock -->
  <div class="clock-block">
    <div class="clock-left">
      <div class="clock-time" id="w-clock">--:--<span class="seconds">:--</span></div>
      <div class="clock-date" id="w-clock-date">...</div>
      <div class="clock-tz" id="w-clock-tz"></div>
    </div>
    <div class="clock-right">
      <div class="clock-day-night" id="w-day-night"></div>
      <div class="clock-utc" id="w-utc"></div>
    </div>
  </div>

  <div class="temp-main" id="w-temp"></div>
  <div class="description" id="w-desc"></div>
  <div class="feels-like" id="w-feels"></div>
  <hr class="divider" />
  <div class="stats">
    <div class="stat">
      <div class="stat-icon">&#128167;</div>
      <div class="stat-value" id="w-humidity"></div>
      <div class="stat-label">Влажность</div>
    </div>
    <div class="stat">
      <div class="stat-icon">&#127788;</div>
      <div class="stat-value" id="w-wind"></div>
      <div class="stat-label">Ветер</div>
    </div>
    <div class="stat">
      <div class="stat-icon">&#127777;</div>
      <div class="stat-value" id="w-pressure"></div>
      <div class="stat-label">Давление</div>
    </div>
  </div>
</div>

<div id="forecast-card">
  <h3>Прогноз на 7 дней</h3>
  <div class="forecast-days" id="forecast-days"></div>
  <div id="day-detail">
    <div class="detail-inner" id="detail-inner"></div>
  </div>
</div>

<script>
  const DAYS_SHORT = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  const DAYS_FULL  = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  const MONTHS     = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

  const WMO = {
    0:  { icon:'☀️',  label:'Ясно' },
    1:  { icon:'🌤',  label:'Преимущественно ясно' },
    2:  { icon:'⛅',  label:'Переменная облачность' },
    3:  { icon:'☁️',  label:'Пасмурно' },
    45: { icon:'🌫',  label:'Туман' },
    48: { icon:'🌫',  label:'Туман с изморозью' },
    51: { icon:'🌦',  label:'Слабая морось' },
    53: { icon:'🌦',  label:'Умеренная морось' },
    55: { icon:'🌧',  label:'Сильная морось' },
    61: { icon:'🌧',  label:'Слабый дождь' },
    63: { icon:'🌧',  label:'Умеренный дождь' },
    65: { icon:'🌧',  label:'Сильный дождь' },
    71: { icon:'❄️',  label:'Слабый снег' },
    73: { icon:'❄️',  label:'Умеренный снег' },
    75: { icon:'❄️',  label:'Сильный снег' },
    77: { icon:'🌨',  label:'Снежная крупа' },
    80: { icon:'🌦',  label:'Слабые ливни' },
    81: { icon:'🌧',  label:'Умеренные ливни' },
    82: { icon:'⛈',  label:'Сильные ливни' },
    85: { icon:'🌨',  label:'Снегопад' },
    86: { icon:'🌨',  label:'Сильный снегопад' },
    95: { icon:'⛈',  label:'Гроза' },
    96: { icon:'⛈',  label:'Гроза с градом' },
    99: { icon:'⛈',  label:'Гроза с сильным градом' },
  };

  function wmo(code) { return WMO[code] || { icon:'🌡', label:'Неизвестно' }; }

  let selectedLocation = null;
  let suggestTimeout   = null;
  let suggestResults   = [];
  let dailyData        = null;
  let activeDayIndex   = null;
  let clockInterval    = null;
  let clockTimezone    = null;

  // ── Clock ──────────────────────────────────────────────
  function startClock(timezone) {
    clockTimezone = timezone;
    if (clockInterval) clearInterval(clockInterval);
    tickClock();
    clockInterval = setInterval(tickClock, 1000);
  }

  function tickClock() {
    if (!clockTimezone) return;
    const now = new Date();

    const hm = now.toLocaleTimeString('ru-RU', {
      timeZone: clockTimezone, hour: '2-digit', minute: '2-digit'
    });
    const sec = now.toLocaleTimeString('ru-RU', {
      timeZone: clockTimezone, second: '2-digit'
    });
    document.getElementById('w-clock').innerHTML =
      `${hm}<span class="seconds">:${sec}</span>`;

    document.getElementById('w-clock-date').textContent =
      now.toLocaleDateString('ru-RU', {
        timeZone: clockTimezone,
        weekday: 'long', day: 'numeric', month: 'long'
      });

    // UTC offset label
    const tzLabel = new Intl.DateTimeFormat('en', {
      timeZone: clockTimezone, timeZoneName: 'short'
    }).formatToParts(now).find(p => p.type === 'timeZoneName')?.value || '';
    document.getElementById('w-clock-tz').textContent = clockTimezone.replace('_', ' ');
    document.getElementById('w-utc').textContent = tzLabel;

    // Day / night icon based on local hour
    const localHour = parseInt(now.toLocaleTimeString('en-US', {
      timeZone: clockTimezone, hour: 'numeric', hour12: false
    }), 10);
    document.getElementById('w-day-night').textContent =
      (localHour >= 6 && localHour < 21) ? '☀️' : '🌙';
  }

  // ── Search ─────────────────────────────────────────────
  function onInput() {
    selectedLocation = null;
    clearTimeout(suggestTimeout);
    const q = document.getElementById('city-input').value.trim();
    if (q.length < 2) { hideSuggestions(); return; }
    suggestTimeout = setTimeout(() => fetchSuggestions(q), 350);
  }

  function onKey(e) {
    if (e.key === 'Enter') { hideSuggestions(); searchSelected(); }
    if (e.key === 'Escape') hideSuggestions();
  }

  async function fetchSuggestions(q) {
    try {
      const res = await fetch(
        `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=6&language=ru&format=json`
      );
      const data = await res.json();
      suggestResults = data.results || [];
      renderSuggestions(suggestResults);
    } catch (_) {}
  }

  function renderSuggestions(results) {
    const box = document.getElementById('suggestions');
    if (!results.length) { hideSuggestions(); return; }
    box.innerHTML = results.map((r, i) => {
      const parts = [r.admin1, r.country].filter(Boolean).join(', ');
      return `<div onclick="pickSuggestion(${i})">${r.name}<small>${parts}</small></div>`;
    }).join('');
    box.style.display = 'block';
  }

  function pickSuggestion(i) {
    selectedLocation = suggestResults[i];
    document.getElementById('city-input').value = selectedLocation.name;
    hideSuggestions();
    fetchWeather(selectedLocation);
  }

  function hideSuggestions() {
    document.getElementById('suggestions').style.display = 'none';
  }

  function quickSearch(city) {
    document.getElementById('city-input').value = city;
    selectedLocation = null;
    searchSelected();
  }

  async function searchSelected() {
    hideSuggestions();
    if (selectedLocation) { fetchWeather(selectedLocation); return; }
    const q = document.getElementById('city-input').value.trim();
    if (!q) return;
    setLoading(true);
    clearError();
    try {
      const res = await fetch(
        `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=ru&format=json`
      );
      const data = await res.json();
      if (!data.results || !data.results.length) throw new Error('Город не найден. Проверьте написание.');
      selectedLocation = data.results[0];
      await fetchWeather(selectedLocation);
    } catch (e) {
      showError(e.message);
      setLoading(false);
    }
  }

  // ── Weather ────────────────────────────────────────────
  async function fetchWeather(loc) {
    setLoading(true);
    clearError();
    closeDayDetail();
    try {
      const params = new URLSearchParams({
        latitude: loc.latitude,
        longitude: loc.longitude,
        current: 'temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,surface_pressure',
        daily: [
          'weather_code','temperature_2m_max','temperature_2m_min',
          'precipitation_sum','precipitation_hours',
          'wind_speed_10m_max','wind_gusts_10m_max',
          'uv_index_max','sunrise','sunset',
        ].join(','),
        timezone: 'auto',
        forecast_days: 7,
      });
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
      if (!res.ok) throw new Error('Ошибка получения данных: ' + res.status);
      const data = await res.json();
      dailyData = data.daily;
      renderWeather(data, loc);
      renderForecast(data.daily);
      startClock(data.timezone);
    } catch (e) {
      showError(e.message);
      document.getElementById('weather-card').style.display = 'none';
      document.getElementById('forecast-card').style.display = 'none';
    } finally {
      setLoading(false);
    }
  }

  function renderWeather(data, loc) {
    const c = data.current;
    const meta = wmo(c.weather_code);
    const parts = [loc.admin1, loc.country].filter(Boolean).join(', ');
    document.getElementById('w-location').innerHTML = `${loc.name}<small>${parts}</small>`;
    document.getElementById('w-icon').textContent = meta.icon;
    document.getElementById('w-temp').textContent = `${Math.round(c.temperature_2m)}°C`;
    document.getElementById('w-desc').textContent = meta.label;
    document.getElementById('w-feels').textContent = `Ощущается как ${Math.round(c.apparent_temperature)}°C`;
    document.getElementById('w-humidity').textContent = `${c.relative_humidity_2m}%`;
    document.getElementById('w-wind').textContent = `${Math.round(c.wind_speed_10m)} км/ч`;
    document.getElementById('w-pressure').textContent = `${Math.round(c.surface_pressure * 0.750064)} мм`;
    document.getElementById('weather-card').style.display = 'block';
  }

  // ── Forecast ───────────────────────────────────────────
  function renderForecast(daily) {
    const today = new Date().toDateString();
    const html = daily.time.map((t, i) => {
      const dt = new Date(t);
      if (dt.toDateString() === today) return '';
      const meta = wmo(daily.weather_code[i]);
      const max = Math.round(daily.temperature_2m_max[i]);
      const min = Math.round(daily.temperature_2m_min[i]);
      return `<div class="forecast-day" id="fday-${i}" onclick="toggleDayDetail(${i})">
        <div class="day-name">${DAYS_SHORT[dt.getDay()]}</div>
        <div class="day-icon">${meta.icon}</div>
        <div><span class="day-max">${max}°</span><span class="day-min">${min}°</span></div>
        <div class="day-hint">подробнее</div>
      </div>`;
    }).join('');
    document.getElementById('forecast-days').innerHTML = html;
    document.getElementById('forecast-card').style.display = 'block';
  }

  function toggleDayDetail(i) {
    if (activeDayIndex === i) { closeDayDetail(); return; }
    if (activeDayIndex !== null) {
      const prev = document.getElementById(`fday-${activeDayIndex}`);
      if (prev) prev.classList.remove('active');
    }
    activeDayIndex = i;
    document.getElementById(`fday-${i}`).classList.add('active');
    renderDayDetail(i);
    document.getElementById('day-detail').classList.add('open');
  }

  function closeDayDetail() {
    if (activeDayIndex !== null) {
      const el = document.getElementById(`fday-${activeDayIndex}`);
      if (el) el.classList.remove('active');
    }
    activeDayIndex = null;
    document.getElementById('day-detail').classList.remove('open');
  }

  function renderDayDetail(i) {
    const d = dailyData;
    const dt = new Date(d.time[i]);
    const meta    = wmo(d.weather_code[i]);
    const max     = Math.round(d.temperature_2m_max[i]);
    const min     = Math.round(d.temperature_2m_min[i]);
    const precip  = d.precipitation_sum[i] ?? 0;
    const precipH = d.precipitation_hours[i] ?? 0;
    const windMax = Math.round(d.wind_speed_10m_max[i] ?? 0);
    const gusts   = Math.round(d.wind_gusts_10m_max[i] ?? 0);
    const uv      = d.uv_index_max[i] ?? '—';
    const sunrise = formatTime(d.sunrise[i]);
    const sunset  = formatTime(d.sunset[i]);
    const dateStr = `${dt.getDate()} ${MONTHS[dt.getMonth()]}`;

    document.getElementById('detail-inner').innerHTML = `
      <div class="detail-header">
        <div class="detail-date">${DAYS_FULL[dt.getDay()]}<small>${dateStr}</small></div>
        <div class="detail-icon-desc">
          <div class="detail-icon">${meta.icon}</div>
          <div class="detail-desc">${meta.label}</div>
        </div>
      </div>
      <div class="detail-temps">
        <span class="max">${max}°C</span>
        <span class="min">${min}°C</span>
      </div>
      <hr class="detail-divider" />
      <div class="detail-grid">
        <div class="detail-item">
          <div class="di-icon">🌧</div>
          <div class="di-val">${precip.toFixed(1)} мм</div>
          <div class="di-lbl">Осадки</div>
        </div>
        <div class="detail-item">
          <div class="di-icon">⏱</div>
          <div class="di-val">${precipH} ч</div>
          <div class="di-lbl">Часов дождя</div>
        </div>
        <div class="detail-item">
          <div class="di-icon">🌬</div>
          <div class="di-val">${windMax} км/ч</div>
          <div class="di-lbl">Ветер макс</div>
        </div>
        <div class="detail-item">
          <div class="di-icon">💨</div>
          <div class="di-val">${gusts} км/ч</div>
          <div class="di-lbl">Порывы</div>
        </div>
        <div class="detail-item">
          <div class="di-icon">🔆</div>
          <div class="di-val">${uv}</div>
          <div class="di-lbl">УФ-индекс</div>
        </div>
        <div class="detail-item">
          <div class="di-icon">🌡</div>
          <div class="di-val">${max - min}°</div>
          <div class="di-lbl">Перепад</div>
        </div>
      </div>
      <div class="sun-row">
        <div class="sun-item">
          <div class="sun-icon">🌅</div>
          <div class="sun-val">${sunrise}</div>
          <div class="sun-lbl">Рассвет</div>
        </div>
        <div class="sun-item">
          <div class="sun-icon">🌇</div>
          <div class="sun-val">${sunset}</div>
          <div class="sun-lbl">Закат</div>
        </div>
      </div>`;
  }

  function formatTime(isoStr) {
    if (!isoStr) return '—';
    return new Date(isoStr).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
  }

  function setLoading(on) { document.getElementById('loading').style.display = on ? 'block' : 'none'; }
  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function clearError() { document.getElementById('error').style.display = 'none'; }

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrapper')) hideSuggestions();
  });
</script>
</body>
</html>
