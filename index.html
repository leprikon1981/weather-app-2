<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#16213e" />
  <meta name="description" content="Погода, прогноз, время и валюты без API-ключей." />
  <title>Погода v4</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <div class="app-title">
          <h1>Погода</h1>
          <span class="version-badge">v4</span>
        </div>
        <div class="subtitle">Фото города · Реальное время · Без ключей</div>
      </div>
      <button class="icon-button" id="theme-toggle" type="button" title="Переключить тему" aria-label="Переключить тему">◐</button>
    </header>

    <section class="search-panel" aria-label="Поиск города">
      <div class="search-box">
        <div class="search-wrapper">
          <input id="city-input" type="text" placeholder="Введите город или страну..." autocomplete="off" />
          <div id="suggestions"></div>
        </div>
        <button id="search-button" type="button">Найти</button>
      </div>

      <div class="action-row">
        <button id="geo-button" class="secondary-button" type="button">Погода рядом со мной</button>
        <button id="favorite-button" class="secondary-button" type="button" disabled>Добавить в избранное</button>
      </div>

      <div class="saved-row" id="favorites-row" aria-label="Избранные города"></div>
      <div class="saved-row muted-row" id="history-row" aria-label="История поиска"></div>
    </section>

    <div class="quick-picks">
      <button type="button" data-city="Москва">Москва</button>
      <button type="button" data-city="Санкт-Петербург">Санкт-Петербург</button>
      <button type="button" data-city="Лондон">Лондон</button>
      <button type="button" data-city="Нью-Йорк">Нью-Йорк</button>
      <button type="button" data-city="Токио">Токио</button>
      <button type="button" data-city="Дубай">Дубай</button>
      <button type="button" data-city="Париж">Париж</button>
      <button type="button" data-city="Берлин">Берлин</button>
      <button type="button" data-city="Пекин">Пекин</button>
      <button type="button" data-city="Сидней">Сидней</button>
    </div>

    <div id="loading"><span class="spinner"></span>Загрузка...</div>
    <div id="error" role="alert"></div>

    <section id="weather-card">
      <div class="city-banner" id="city-banner">
        <div class="city-banner-shimmer" id="city-shimmer"></div>
        <img id="city-img" alt="Фото города" />
        <div class="city-banner-gradient"></div>
        <div class="city-banner-label" id="city-img-credit"></div>
      </div>

      <div class="card-body">
        <div class="card-header">
          <div class="location" id="w-location"></div>
          <div class="w-icon" id="w-icon"></div>
        </div>

        <div class="clock-block">
          <div class="clock-left">
            <div class="clock-time" id="w-clock">--:--<span class="seconds">:--</span></div>
            <div class="clock-date" id="w-clock-date">...</div>
            <div class="clock-tz" id="w-clock-tz"></div>
          </div>
          <div class="clock-right">
            <div class="clock-day-night" id="w-day-night"></div>
            <div class="clock-utc" id="w-utc"></div>
          </div>
        </div>

        <div class="temp-main" id="w-temp"></div>
        <div class="description" id="w-desc"></div>
        <div class="feels-like" id="w-feels"></div>
        <hr class="divider" />

        <div class="stats">
          <div class="stat">
            <div class="stat-icon">💧</div>
            <div class="stat-value" id="w-humidity"></div>
            <div class="stat-label">Влажность</div>
          </div>
          <div class="stat">
            <div class="stat-icon">💨</div>
            <div class="stat-value" id="w-wind"></div>
            <div class="stat-label">Ветер</div>
          </div>
          <div class="stat">
            <div class="stat-icon">🌡</div>
            <div class="stat-value" id="w-pressure"></div>
            <div class="stat-label">Давление</div>
          </div>
        </div>

        <div class="extra-grid" id="extra-grid"></div>
      </div>
    </section>

    <section class="info-card" id="hourly-card">
      <h2>Почасовой прогноз</h2>
      <div class="hourly-strip" id="hourly-strip"></div>
    </section>

    <section class="info-card" id="forecast-card">
      <h2>Прогноз на 7 дней</h2>
      <div class="forecast-days" id="forecast-days"></div>
      <div id="day-detail">
        <div class="detail-inner" id="detail-inner"></div>
      </div>
    </section>

    <section class="info-card" id="currency-card">
      <h2>Курс валют</h2>
      <div class="currency-hero">
        <div class="currency-hero-name" id="cur-name">—</div>
        <div class="currency-hero-rate" id="cur-rate">—</div>
      </div>
      <div class="calc-box">
        <label for="calc-amount">Калькулятор</label>
        <div class="calc-row">
          <input type="number" id="calc-amount" value="100" min="0" />
          <select id="calc-from" aria-label="Из валюты"></select>
          <span class="calc-arrow">→</span>
          <div class="calc-result" id="calc-result">—</div>
          <select id="calc-to" aria-label="В валюту"></select>
          <button class="calc-swap" id="calc-swap" type="button" title="Поменять местами">⇄</button>
        </div>
      </div>
      <div class="rates-grid" id="rates-grid"></div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
