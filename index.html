<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Погода</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 8px;
      opacity: 0.9;
    }
    .subtitle {
      font-size: 0.78rem;
      opacity: 0.35;
      letter-spacing: 2px;
      margin-bottom: 36px;
      text-transform: uppercase;
    }

    .search-box {
      display: flex;
      gap: 10px;
      max-width: 600px;
      width: 100%;
      margin-bottom: 20px;
    }
    .search-box input {
      flex: 1;
      padding: 14px 20px;
      border-radius: 50px;
      border: 2px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input::placeholder { color: rgba(255,255,255,0.38); }
    .search-box input:focus { border-color: rgba(255,255,255,0.38); }
    .search-box button {
      padding: 14px 28px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .search-box button:hover { opacity: 0.88; transform: scale(1.02); }
    .search-box button:active { transform: scale(0.97); }

    .quick-picks {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: 600px;
      width: 100%;
      margin-bottom: 32px;
      justify-content: center;
    }
    .quick-picks span {
      padding: 6px 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.2s;
      user-select: none;
    }
    .quick-picks span:hover { background: rgba(255,255,255,0.16); }

    #error {
      display: none;
      color: #ff8a80;
      background: rgba(255,0,0,0.08);
      border: 1px solid rgba(255,0,0,0.2);
      border-radius: 10px;
      padding: 12px 20px;
      max-width: 600px;
      width: 100%;
      margin-bottom: 20px;
      text-align: center;
      font-size: 0.9rem;
    }

    #loading {
      display: none;
      font-size: 0.92rem;
      opacity: 0.6;
      margin-bottom: 20px;
    }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #weather-card {
      display: none;
      max-width: 600px;
      width: 100%;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 20px;
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .location { font-size: 1.55rem; font-weight: 600; line-height: 1.2; }
    .location small {
      display: block;
      font-size: 0.88rem;
      font-weight: 400;
      opacity: 0.5;
      margin-top: 4px;
    }
    .w-icon { font-size: 4rem; line-height: 1; }

    .temp-main { font-size: 5rem; font-weight: 200; line-height: 1; margin-bottom: 8px; }
    .description { font-size: 1.05rem; opacity: 0.7; text-transform: capitalize; margin-bottom: 6px; }
    .feels-like { font-size: 0.88rem; opacity: 0.5; margin-bottom: 28px; }

    hr.divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin-bottom: 24px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .stat { text-align: center; }
    .stat-icon { font-size: 1.35rem; margin-bottom: 6px; }
    .stat-value { font-size: 1.1rem; font-weight: 600; }
    .stat-label { font-size: 0.72rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

    #forecast-card {
      display: none;
      max-width: 600px;
      width: 100%;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 24px;
      animation: fadeUp 0.4s ease 0.1s both;
    }
    #forecast-card h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.45;
      margin-bottom: 16px;
    }
    .forecast-days {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .forecast-day {
      flex: 1;
      min-width: 72px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 12px 6px;
    }
    .forecast-day .day-name { font-size: 0.76rem; opacity: 0.5; margin-bottom: 8px; }
    .forecast-day .day-icon { font-size: 1.5rem; margin-bottom: 8px; }
    .forecast-day .day-max { font-size: 0.95rem; font-weight: 600; }
    .forecast-day .day-min { font-size: 0.85rem; opacity: 0.45; margin-left: 3px; }

    /* suggestions dropdown */
    .search-wrapper { position: relative; flex: 1; }
    #suggestions {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: #1e2a45;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      overflow: hidden;
      z-index: 100;
      max-height: 220px;
      overflow-y: auto;
    }
    #suggestions div {
      padding: 12px 18px;
      cursor: pointer;
      font-size: 0.92rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.15s;
    }
    #suggestions div:last-child { border-bottom: none; }
    #suggestions div:hover { background: rgba(255,255,255,0.1); }
    #suggestions div small { display: block; font-size: 0.75rem; opacity: 0.45; margin-top: 2px; }
  </style>
</head>
<body>

<h1>&#127748; Погода</h1>
<div class="subtitle">Без регистрации и API-ключа</div>

<div class="search-box">
  <div class="search-wrapper">
    <input id="city-input" type="text" placeholder="Введите город или страну..."
           oninput="onInput()" onkeydown="onKey(event)" autocomplete="off" />
    <div id="suggestions"></div>
  </div>
  <button onclick="searchSelected()">Найти</button>
</div>

<div class="quick-picks">
  <span onclick="quickSearch('Москва')">Москва</span>
  <span onclick="quickSearch('Санкт-Петербург')">Санкт-Петербург</span>
  <span onclick="quickSearch('Лондон')">Лондон</span>
  <span onclick="quickSearch('Нью-Йорк')">Нью-Йорк</span>
  <span onclick="quickSearch('Токио')">Токио</span>
  <span onclick="quickSearch('Дубай')">Дубай</span>
  <span onclick="quickSearch('Париж')">Париж</span>
  <span onclick="quickSearch('Берлин')">Берлин</span>
  <span onclick="quickSearch('Пекин')">Пекин</span>
  <span onclick="quickSearch('Сидней')">Сидней</span>
</div>

<div id="loading"><span class="spinner"></span>Загрузка...</div>
<div id="error"></div>

<div id="weather-card">
  <div class="card-header">
    <div class="location" id="w-location"></div>
    <div class="w-icon" id="w-icon"></div>
  </div>
  <div class="temp-main" id="w-temp"></div>
  <div class="description" id="w-desc"></div>
  <div class="feels-like" id="w-feels"></div>
  <hr class="divider" />
  <div class="stats">
    <div class="stat">
      <div class="stat-icon">&#128167;</div>
      <div class="stat-value" id="w-humidity"></div>
      <div class="stat-label">Влажность</div>
    </div>
    <div class="stat">
      <div class="stat-icon">&#127788;</div>
      <div class="stat-value" id="w-wind"></div>
      <div class="stat-label">Ветер</div>
    </div>
    <div class="stat">
      <div class="stat-icon">&#127777;</div>
      <div class="stat-value" id="w-pressure"></div>
      <div class="stat-label">Давление</div>
    </div>
  </div>
</div>

<div id="forecast-card">
  <h3>Прогноз на 7 дней</h3>
  <div class="forecast-days" id="forecast-days"></div>
</div>

<script>
  const DAYS = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];

  // WMO weather code → { icon, label }
  const WMO = {
    0:  { icon:'☀️',  label:'Ясно' },
    1:  { icon:'🌤',  label:'Преимущественно ясно' },
    2:  { icon:'⛅',  label:'Переменная облачность' },
    3:  { icon:'☁️',  label:'Пасмурно' },
    45: { icon:'🌫',  label:'Туман' },
    48: { icon:'🌫',  label:'Туман с изморозью' },
    51: { icon:'🌦',  label:'Слабая морось' },
    53: { icon:'🌦',  label:'Умеренная морось' },
    55: { icon:'🌧',  label:'Сильная морось' },
    61: { icon:'🌧',  label:'Слабый дождь' },
    63: { icon:'🌧',  label:'Умеренный дождь' },
    65: { icon:'🌧',  label:'Сильный дождь' },
    71: { icon:'❄️',  label:'Слабый снег' },
    73: { icon:'❄️',  label:'Умеренный снег' },
    75: { icon:'❄️',  label:'Сильный снег' },
    77: { icon:'🌨',  label:'Снежная крупа' },
    80: { icon:'🌦',  label:'Слабые ливни' },
    81: { icon:'🌧',  label:'Умеренные ливни' },
    82: { icon:'⛈',  label:'Сильные ливни' },
    85: { icon:'🌨',  label:'Снегопад' },
    86: { icon:'🌨',  label:'Сильный снегопад' },
    95: { icon:'⛈',  label:'Гроза' },
    96: { icon:'⛈',  label:'Гроза с градом' },
    99: { icon:'⛈',  label:'Гроза с сильным градом' },
  };

  function wmo(code) {
    return WMO[code] || { icon:'🌡', label:'Неизвестно' };
  }

  let selectedLocation = null;
  let suggestTimeout = null;
  let suggestResults = [];

  function onInput() {
    selectedLocation = null;
    clearTimeout(suggestTimeout);
    const q = document.getElementById('city-input').value.trim();
    if (q.length < 2) { hideSuggestions(); return; }
    suggestTimeout = setTimeout(() => fetchSuggestions(q), 350);
  }

  function onKey(e) {
    if (e.key === 'Enter') { hideSuggestions(); searchSelected(); }
    if (e.key === 'Escape') hideSuggestions();
  }

  async function fetchSuggestions(q) {
    try {
      const res = await fetch(
        `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=6&language=ru&format=json`
      );
      const data = await res.json();
      suggestResults = data.results || [];
      renderSuggestions(suggestResults);
    } catch (_) {}
  }

  function renderSuggestions(results) {
    const box = document.getElementById('suggestions');
    if (!results.length) { hideSuggestions(); return; }
    box.innerHTML = results.map((r, i) => {
      const parts = [r.admin1, r.country].filter(Boolean).join(', ');
      return `<div onclick="pickSuggestion(${i})">
        ${r.name}
        <small>${parts}</small>
      </div>`;
    }).join('');
    box.style.display = 'block';
  }

  function pickSuggestion(i) {
    selectedLocation = suggestResults[i];
    document.getElementById('city-input').value = selectedLocation.name;
    hideSuggestions();
    fetchWeather(selectedLocation);
  }

  function hideSuggestions() {
    document.getElementById('suggestions').style.display = 'none';
  }

  function quickSearch(city) {
    document.getElementById('city-input').value = city;
    selectedLocation = null;
    searchSelected();
  }

  async function searchSelected() {
    hideSuggestions();
    if (selectedLocation) { fetchWeather(selectedLocation); return; }

    const q = document.getElementById('city-input').value.trim();
    if (!q) return;

    setLoading(true);
    clearError();
    try {
      const res = await fetch(
        `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=ru&format=json`
      );
      const data = await res.json();
      if (!data.results || !data.results.length) throw new Error('Город не найден. Проверьте написание.');
      selectedLocation = data.results[0];
      await fetchWeather(selectedLocation);
    } catch (e) {
      showError(e.message);
      setLoading(false);
    }
  }

  async function fetchWeather(loc) {
    setLoading(true);
    clearError();
    try {
      const params = new URLSearchParams({
        latitude: loc.latitude,
        longitude: loc.longitude,
        current: 'temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,surface_pressure',
        daily: 'weather_code,temperature_2m_max,temperature_2m_min',
        timezone: 'auto',
        forecast_days: 7,
      });
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
      if (!res.ok) throw new Error('Ошибка получения данных: ' + res.status);
      const data = await res.json();
      renderWeather(data, loc);
      renderForecast(data);
    } catch (e) {
      showError(e.message);
      document.getElementById('weather-card').style.display = 'none';
      document.getElementById('forecast-card').style.display = 'none';
    } finally {
      setLoading(false);
    }
  }

  function renderWeather(data, loc) {
    const c = data.current;
    const meta = wmo(c.weather_code);
    const parts = [loc.admin1, loc.country].filter(Boolean).join(', ');

    document.getElementById('w-location').innerHTML =
      `${loc.name}<small>${parts}</small>`;
    document.getElementById('w-icon').textContent = meta.icon;
    document.getElementById('w-temp').textContent = `${Math.round(c.temperature_2m)}°C`;
    document.getElementById('w-desc').textContent = meta.label;
    document.getElementById('w-feels').textContent =
      `Ощущается как ${Math.round(c.apparent_temperature)}°C`;
    document.getElementById('w-humidity').textContent = `${c.relative_humidity_2m}%`;
    document.getElementById('w-wind').textContent = `${Math.round(c.wind_speed_10m)} км/ч`;
    document.getElementById('w-pressure').textContent =
      `${Math.round(c.surface_pressure * 0.750064)} мм`;
    document.getElementById('weather-card').style.display = 'block';
  }

  function renderForecast(data) {
    const { time, weather_code, temperature_2m_max, temperature_2m_min } = data.daily;
    const today = new Date().toDateString();

    const html = time.map((t, i) => {
      const dt = new Date(t);
      if (dt.toDateString() === today) return '';
      const meta = wmo(weather_code[i]);
      const name = DAYS[dt.getDay()];
      const max = Math.round(temperature_2m_max[i]);
      const min = Math.round(temperature_2m_min[i]);
      return `<div class="forecast-day">
        <div class="day-name">${name}</div>
        <div class="day-icon">${meta.icon}</div>
        <div><span class="day-max">${max}°</span><span class="day-min">${min}°</span></div>
      </div>`;
    }).join('');

    document.getElementById('forecast-days').innerHTML = html;
    document.getElementById('forecast-card').style.display = 'block';
  }

  function setLoading(on) {
    document.getElementById('loading').style.display = on ? 'block' : 'none';
  }
  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function clearError() {
    document.getElementById('error').style.display = 'none';
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrapper')) hideSuggestions();
  });
</script>
</body>
</html>
